<!-- src/app/features/auth/components/forgot-password/forgot-password.html -->
<main class="auth-page">
  <section class="auth-panel">
    <div class="auth-brand">
      <span>E</span>
      <div>
        <h1>EscrowX</h1>
        <p>Admin console</p>
      </div>
    </div>

    <!-- ✅ SUCCESS STATE -->
    @if (success()) {
      <div class="auth-alert auth-alert-success">
        ✅ A reset code has been sent to your email. Please check your inbox.
      </div>
      <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
        <button class="auth-submit" (click)="goToReset()">Proceed to Reset</button>
        <a routerLink="/login" class="auth-link">Back to Login</a>
      </div>
    } @else {
      <!-- ✅ ERROR STATE -->
      @if (error()) {
        <div class="auth-alert auth-alert-error">{{ error() }}</div>
      }

      <!-- ✅ FORM -->
      <form class="auth-form" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <label>
          <span>Email address</span>
          <input type="email" formControlName="email" placeholder="you@example.com" />
        </label>

        <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="error-message">
          <span *ngIf="forgotForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="forgotForm.get('email')?.errors?.['email']">Enter a valid email</span>
        </div>

        <button type="submit" class="auth-submit" [disabled]="forgotForm.invalid || loading()">
          @if (loading()) {
            <i class="fas fa-spinner fa-spin"></i>
          } @else {
            <i class="fas fa-envelope"></i>
          }
          {{ loading() ? 'Sending...' : 'Send Reset Code' }}
        </button>

        <div class="auth-extra">
          <a routerLink="/login">Back to Login</a>
        </div>
      </form>
    }
  </section>
</main>
