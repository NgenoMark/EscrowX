<!-- src/app/features/auth/components/reset-password/reset-password.html -->
<main class="auth-page">
  <section class="auth-panel">
    <div class="auth-brand">
      <span>E</span>
      <div>
        <h1>EscrowX</h1>
        <p>Admin console</p>
      </div>
    </div>

    <h2 style="margin-top: 0; font-size: 1.25rem;">Reset your password</h2>
    <p style="color: #64748b; margin-bottom: 1.5rem;">
      Enter the code sent to your email and choose a new password.
    </p>

    @if (error()) {
      <div class="auth-alert auth-alert-error">{{ error() }}</div>
    }

    <form class="auth-form" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <!-- OTP field – hidden if already in URL -->
      @if (!otpFromUrl) {
        <div class="form-group">
          <label for="otp">Reset Code (OTP)</label>
          <input id="otp" type="text" formControlName="otp" placeholder="Paste the code from your email" />
          <div *ngIf="resetForm.get('otp')?.invalid && resetForm.get('otp')?.touched" class="error-message">
            <span *ngIf="resetForm.get('otp')?.errors?.['required']">Code required</span>
          </div>
        </div>
      } @else {
        <div class="auth-info">✓ Reset code detected from your link</div>
      }

      <!-- New Password with toggle -->
      <div class="form-group password-group">
        <label for="newPassword">New Password</label>
        <div class="password-input-wrapper">
          <input
            id="newPassword"
            [type]="showNewPassword() ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="Minimum 6 characters"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="toggleNewPassword()"
            tabindex="-1"
            aria-label="Toggle password visibility"
          >
            <i [class]="showNewPassword() ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
        <div *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched" class="error-message">
          <span *ngIf="resetForm.get('newPassword')?.errors?.['required']">Password required</span>
          <span *ngIf="resetForm.get('newPassword')?.errors?.['minlength']">Min 6 characters</span>
        </div>
      </div>

      <!-- Confirm Password with toggle -->
      <div class="form-group password-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-input-wrapper">
          <input
            id="confirmPassword"
            [type]="showConfirmPassword() ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Re-enter password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="toggleConfirmPassword()"
            tabindex="-1"
            aria-label="Toggle password visibility"
          >
            <i [class]="showConfirmPassword() ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
        <div *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched" class="error-message">
          Passwords do not match
        </div>
      </div>

      <button type="submit" class="auth-submit" [disabled]="resetForm.invalid || loading()">
        @if (loading()) {
          <i class="fas fa-spinner fa-spin"></i>
        } @else {
          <i class="fas fa-key"></i>
        }
        {{ loading() ? 'Resetting...' : 'Reset Password' }}
      </button>

      <div class="auth-extra">
        <a routerLink="/login">Back to Login</a>
      </div>
    </form>
  </section>
</main>
