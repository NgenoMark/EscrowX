<div class="app-shell">
  <app-header [sidebarCollapsed]="sidebarCollapsed" [mobileSidebarOpen]="mobileSidebarOpen" (toggleSidebar)="toggleSidebar()"></app-header>
  <div class="layout-body">
    <app-sidebar
      [collapsed]="sidebarCollapsed"
      [mobileOpen]="mobileSidebarOpen"
      (closeMobile)="closeMobileSidebar()"
    ></app-sidebar>
    <main class="content-area">
      <div class="page-frame">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
  @if (mobileSidebarOpen) {
    <div class="sidebar-backdrop" (click)="closeMobileSidebar()"></div>
  }

  <!-- Chatbot outside the scrollable content -->
  <app-chatbot></app-chatbot>
</div>
