services:
  postgres:
    image: postgres:16
    container_name: escrowx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: escrowx
      POSTGRES_USER: escrowx
      POSTGRES_PASSWORD: escrowx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrowx -d escrowx"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: escrowx-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/escrowx
      DATABASE_USERNAME: escrowx
      DATABASE_PASSWORD: escrowx
    ports:
      - "8081:8081"

volumes:
  postgres_data:
